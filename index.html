<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MVBT Trail Weather</title>
  <!-- Bump ?v= whenever styles.css or app.js changes, so browsers/GitHub Pages
       CDN fetch the new file instead of serving a stale cached copy. -->
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
<main id="app">
  <header class="topbar">
    <h1>MVBT Trail Weather</h1>
    <p id="staleness" class="staleness" hidden></p>
  </header>

  <section id="scheduled" class="card">
    <h2>Scheduled practice</h2>
    <div class="venue-picker">
      <label for="venue-select">Venue</label>
      <select id="venue-select"></select>
    </div>
    <div id="scheduled-body"></div>
  </section>

  <section id="board">
    <div class="board-head">
      <h2>All venues</h2>
      <select id="sort-select" aria-label="Sort venues">
        <option value="az">Sort: A–Z</option>
        <option value="wbgt">Sort: WBGT low → high</option>
        <option value="aqi">Sort: AQI best → worst</option>
      </select>
    </div>
    <div id="board-body"></div>
  </section>

  <footer class="footer">
    <p class="senses">Your senses supersede this app. If you hear thunder, clear the trail.</p>
    <p id="data-time" class="data-time"></p>
    <p><a id="policy-link" href="https://minnesotacycling.org/wp-content/uploads/2025/07/MCA-Weather-Policy-2025-.pdf" target="_blank" rel="noopener">MCA Weather Policy 2025 (PDF)</a></p>
  </footer>
</main>
<script type="module" src="./app.js?v=3"></script>
</body>
</html>
